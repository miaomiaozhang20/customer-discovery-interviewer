    "generate_summary_prompt_fpath": "./resources/generate_report_prompt.md",
    "first_interviewer_message": "Hi! Thank you for taking the time to speak with me today. I'm here to learn about your experiences and challenges. This conversation will help us understand if and how we might be able to help people like you. There are no right or wrong answers—I'm just here to listen and learn. To start, could you tell me a bit about yourself and your current situation?",
    "closing_messages": {
        "5j3k": "Thank you for participating, the interview concludes here.",
        "z9w1": "I can't help with that request because my role is to conduct customer discovery interviews."
    },
    "interview_instructions_fpath": "./resources/interview_instructions.md",
