    },
    "production": {
        "dropbox_fpath": "/var/data/customer-discovery/production-data/",
        "auth_config_fpath": "/var/data/customer_discovery_auth_config.yaml",
        "secrets_env_fpath": "/etc/secrets/secrets.env"
    }
